name: Feature Request
description: Suggest an improvement that keeps first-run success high.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What practical workflow problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: Confirm this request does not add monetization, non-Next frameworks, or page-builder complexity.
      placeholder: |
        - No monetization changes
        - Next.js App Router only
        - No page-builder features
    validations:
      required: true
